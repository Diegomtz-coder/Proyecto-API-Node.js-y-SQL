<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="chart.umd.js"></script>
</head>
<body>

<div class="container mt-4">
    <div id="loginContainer" class="card mb-4 bg-dark text-white border-primary shadow">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title text-primary m-0">
                    <i class="bi bi-key"></i> Acceso al Sistema (JWT)
                </h5>
                <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                </button>
            </div>

            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" id="userIn" class="form-control bg-dark text-white border-secondary" placeholder="Usuario">
                </div>
                <div class="col-md-5">
                    <input type="password" id="passIn" class="form-control bg-dark text-white border-secondary" placeholder="Contraseña">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="prepararLogin()">
                        <i class="bi bi-door-open"></i> Entrar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="container mt-5">
        <h1 class="text-center mb-4">📋 Registro de Empleados</h1>
        
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow h-100"> <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">➕ Agregar Nuevo Empleado</h4>
                    </div>
                    <div class="card-body">
                        <form id="empleadoForm">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre *</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="apellido" class="form-label">Apellido *</label>
                                <input type="text" class="form-control" id="apellido" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email *</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="puesto" class="form-label">Puesto</label>
                                <input type="text" class="form-control" id="puesto">
                            </div>
                            <div class="mb-3">
                                <label for="salario" class="form-label">Salario</label>
                                <input type="number" step="0.01" class="form-control" id="salario">
                            </div>
                            <div class="mb-3">
                                <label for="fecha_contratacion" class="form-label">Fecha de Contratación</label>
                                <input type="date" class="form-control" id="fecha_contratacion">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">💾 Guardar Empleado</button>
                        </form>
                        <div id="mensaje" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow h-100">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">📊 Empleados Registrados</h4>
                        <button class="btn btn-sm btn-light" onclick="cargarEmpleados()">↻ Actualizar</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Email</th>
                                        <th>Puesto</th>
                                        <th>Salario</th>
                                    </tr>
                                </thead>
                                <tbody id="empleados">
                                    <tr>
                                        <td colspan="5" class="text-center">Cargando empleados...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>


            <div class="row mt-4 mb-5">
                <div class="col-12">
                     <div class="card bg-dark text-white p-3 shadow" style="border-radius: 15px; border: 1px solid #444;">
                        <div class="card-header border-0 bg-transparent d-flex justify-content-between align-items-center">
                            <h4 class="mb-0">📊 Resumen de Puestos</h4>
                            <a href="http://localhost:3000/excel" class="btn btn-outline-success">
                                <i class="bi bi-file-earmark-excel"></i> Descargar Excel
                            </a>
                        </div>
                    
                        <div class="card-body" style="height: 350px; position: relative;">
                            <canvas id="graficaPuestos"></canvas>
                        </div>
                        </div>
                </div>
            </div>

    <script src="app.js"></script>
</body>
</html>
